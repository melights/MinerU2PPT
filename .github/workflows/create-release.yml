name: Create Release and Build Exe

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v1.1.0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: windows-latest # Must be Windows to build an .exe
    permissions:
      contents: read
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cpu
            requirements_file: requirements-cpu.txt
            output_base_name: MinerU2PPT-win64-cpu-setup
            asset_name: MinerU2PPT-win64-cpu-setup.exe
          - variant: gpu-cu118
            requirements_file: requirements-gpu-cu118.txt
            output_base_name: MinerU2PPT-win64-gpu-cu118-setup
            asset_name: MinerU2PPT-win64-gpu-cu118-setup.exe
          - variant: gpu-cu126
            requirements_file: requirements-gpu-cu126.txt
            output_base_name: MinerU2PPT-win64-gpu-cu126-setup
            asset_name: MinerU2PPT-win64-gpu-cu126-setup.exe
          - variant: gpu-cu129
            requirements_file: requirements-gpu-cu129.txt
            output_base_name: MinerU2PPT-win64-gpu-cu129-setup
            asset_name: MinerU2PPT-win64-gpu-cu129-setup.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.requirements_file }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Runtime deps come from matrix requirements file (CPU/GPU).
          # Build deps are isolated in requirements-build.txt.
          pip install -r ${{ matrix.requirements_file }} -r requirements-build.txt

      - name: Build onedir package with PyInstaller spec
        run: pyinstaller --clean -y gui.spec
        env:
          MINERU_OCR_MODEL_VARIANT: ${{ matrix.variant == 'cpu' && 'cpu' || 'default' }}

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: |
          iscc installer.iss /DMyAppVersion=${{ github.ref_name }} /DOutputBaseFilename=${{ matrix.output_base_name }}
        shell: pwsh

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: installer-output/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create release and upload assets
    runs-on: windows-latest
    needs: build
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
